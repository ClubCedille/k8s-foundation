apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: common-k8s-foundation
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
spec:
  project: k8s-foundation
  destination:
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/ClubCedille/k8s-foundation
    path: common
    targetRevision: HEAD
    directory:
      recurse: true
      include: "{*.argoapp.yaml,*.argoapp.yml}"
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true

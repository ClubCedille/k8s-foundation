# Cilium values for k8s-foundation clusters.
# L2 announcements (no BGP), kube-proxy replacement, Gateway API enabled.
#
# k8sServiceHost: direct IP of a control plane node — used by Cilium to reach
# kube-apiserver before its own eBPF kube-proxy takes over the kubernetes ClusterIP.
# Update this to a dedicated CP VIP if one is configured.
kubeProxyReplacement: true
k8sServiceHost: "10.0.130.11"
k8sServicePort: 6443

ipam:
  mode: kubernetes

gatewayAPI:
  enabled: true

l2announcements:
  enabled: true

loadBalancer:
  l7:
    backend: envoy

operator:
  replicas: 2

hubble:
  relay:
    enabled: true
  ui:
    enabled: true

# Needed for Gateway API HTTPRoutes to work via Envoy
envoy:
  enabled: true

# Talos required tweaks: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium#without-kube-proxy-2
# Talos already mounts the cgroupv2 hierarchy read-write; let Cilium use it instead of remounting.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

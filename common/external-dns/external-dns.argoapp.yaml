apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kf-external-dns
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            stack: k8s-foundation
  template:
    metadata:
      name: "{{.name}}-external-dns"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      destination:
        namespace: external-dns
        server: "{{.server}}"
      project: "{{.name}}"
      sources:
        - repoURL: registry-1.docker.io/bitnamicharts
          chart: external-dns
          targetRevision: 9.0.3
          # releaseName: external-dns
          helm:
            valueFiles:
              - $values/common/external-dns/values.yaml
            values: |
              txtOwnerId: "{{.name}}"
              # etsmtl.club is managed by Cloudflare, not the OPNsense router's
              # RFC2136 DNS server (common/external-dns/values.yaml's default,
              # still used as-is by the other external-dns ApplicationSet on
              # k8s-cedille-production-v2/k8s-cedille-sandbox for cedille.club).
              # Override scoped to this ApplicationSet only.
              provider: cloudflare
              cloudflare:
                secretName: "cloudflare-api-token"
              domainFilters:
                - etsmtl.club
        - repoURL: 'https://github.com/ClubCedille/k8s-foundation.git'
          targetRevision: master
          ref: values
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true

---
apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
# OperatorConfig defines the default settings for all CSI drivers.
apiVersion: csi.ceph.io/v1
kind: OperatorConfig
metadata:
  name: ceph-csi-operator-config
  namespace: rook-ceph # namespace:operator
spec:
  driverSpecDefaults:
    log:
      verbosity: 0
    imageSet:
      name: rook-csi-operator-image-set-configmap
    enableMetadata: true
    generateOMapInfo: false
    fsGroupPolicy: File
    deployCsiAddons: false
    cephFsClientType: kernel
    nodePlugin:
      priorityClassName: "system-node-critical"
      kubeletDirPath: /var/lib/kubelet
      enableSeLinuxHostMount: false
    controllerPlugin:
      priorityClassName: "system-cluster-critical"
      replicas: 2
      deploymentStrategy:
        type: Recreate
---
# RBD CSI Driver
apiVersion: csi.ceph.io/v1
kind: Driver
metadata:
  name: rook-ceph.rbd.csi.ceph.com # csi-provisioner-name
  namespace: rook-ceph # namespace:operator
spec:
  fsGroupPolicy: File
  nodePlugin:
    updateStrategy:
      type: RollingUpdate
  controllerPlugin: {}
---
# CephFS CSI Driver
apiVersion: csi.ceph.io/v1
kind: Driver
metadata:
  name: rook-ceph.cephfs.csi.ceph.com # csi-provisioner-name
  namespace: rook-ceph # namespace:operator
spec:
  fsGroupPolicy: File
  cephFsClientType: kernel
  nodePlugin:
    updateStrategy:
      type: RollingUpdate
  controllerPlugin: {}

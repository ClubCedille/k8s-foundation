apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: config-admin
spec:
  audience: vault
  authentication:
    path: kubernetes
    role: config-admin
  path: kubernetes
  policies:
    - config-admin
  targetServiceAccounts:
    - vault
    - default
    - controller-manager
  targetNamespaces:
    targetNamespaces:
      - vault
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: secret-writer
spec:
  audience: vault
  authentication:
    path: kubernetes
    role: config-admin
  path: kubernetes
  policies:
    - secret-writer
  targetServiceAccounts:
    - '*'
  targetNamespaces:
    targetNamespaces:
      - '*'
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: secret-reader
spec:
  audience: vault
  authentication:
    path: kubernetes
    role: config-admin
  path: kubernetes
  policies:
    - secret-reader
  targetServiceAccounts:
    - '*'
  targetNamespaces:
    targetNamespaces:
      - '*'

# Vault config override for k8s-poc:
#   - Storage: Ceph RGW S3 (on-prem) instead of GCS
#   - Seal: GCP KMS (same keyring as k8s-shared)
#   - StorageClass: cephfs (same as other clusters)
#
# Pre-requisites:
#   1. Create bucket "vault-k8s-poc" on Ceph RGW (via radosgw-admin or Rook OBC)
#   2. Create Secret "rgw-vault-k8s-poc" in the vault namespace with keys
#      access_key/secret_key for a dedicated RGW user scoped to that bucket
#      (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY below are sourced from it -
#      can't come from Vault's own kv store, since Vault needs this to start
#      at all)
#   3. Push GCP KMS service account JSON to vault-config secret (or use workload identity)
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  extraconfig-from-values.hcl: |-
    ui = true
    plugin_directory = "/vault/plugins"
    log_level = "info"
    listener "tcp" {
      tls_disable = 1
      address = "[::]:8200"
      cluster_address = "[::]:8201"
    }
    seal "gcpckms" {
      project     = "cedille-464122"
      region      = "global"
      key_ring    = "vault-cedille"
      crypto_key  = "vault-cedille"
    }
    storage "s3" {
      endpoint               = "http://10.0.21.59:7480"
      bucket                 = "vault-k8s-poc"
      region                 = "default"
      s3_force_path_style    = true
      disable_ssl            = true
      # access_key/secret_key deliberately omitted: the container's startup
      # script only does fixed sed substitutions (HOST_IP, POD_IP, HOSTNAME,
      # API_ADDR, TRANSIT_ADDR, RAFT_ADDR) - it doesn't expand arbitrary
      # ${VAR} placeholders, so a custom "${RGW_ACCESS_KEY}" here would be
      # sent to RGW as the literal credential string. Vault's S3 backend
      # falls back to the AWS SDK's default credential chain (AWS_ACCESS_KEY_ID/
      # AWS_SECRET_ACCESS_KEY env vars) when these keys are absent from the config.
    }
    disable_mlock = true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
spec:
  template:
    spec:
      containers:
        - name: vault
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rgw-vault-k8s-poc
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rgw-vault-k8s-poc
                  key: secret_key
